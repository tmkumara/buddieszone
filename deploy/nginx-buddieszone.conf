# deploy/nginx-buddieszone.conf
#
# Full nginx config for all buddieszone.lk domains currently live:
#   - buddieszone.lk / www.buddieszone.lk  -> this repo's static hub page
#   - craft.buddieszone.lk                 -> Buddies Craft OMS (proxied to 127.0.0.1:3000)
#
# On the server this file replaces /etc/nginx/sites-enabled/buddiescraft
# entirely and should be installed as /etc/nginx/sites-enabled/buddieszone
# (see RUNBOOK.md for the rename + cutover steps). tech.buddieszone.lk has
# no app yet, so it has no server block here — add one when that subdomain
# actually exists.

server {
    listen 443 ssl;
    server_name buddieszone.lk www.buddieszone.lk;

    ssl_certificate /etc/letsencrypt/live/buddieszone.lk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buddieszone.lk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/buddieszone;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    server_name buddieszone.lk www.buddieszone.lk;
    return 301 https://buddieszone.lk$request_uri;
}

server {
    listen 443 ssl;
    server_name craft.buddieszone.lk;

    ssl_certificate /etc/letsencrypt/live/craft.buddieszone.lk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/craft.buddieszone.lk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host craft.buddieszone.lk;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name craft.buddieszone.lk;
    return 301 https://craft.buddieszone.lk$request_uri;
}
